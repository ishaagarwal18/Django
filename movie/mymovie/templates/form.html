<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; }
        
        /* Form Card Wrapper */
        .form-card { background: white; padding: 3rem; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); width: 100%; max-width: 480px; }
        .form-card h2 { font-size: 2rem; font-weight: 800; color: #0f172a; margin-bottom: 0.5rem; text-align: center; }
        .form-card p { color: #64748b; font-size: 0.95rem; text-align: center; margin-bottom: 2rem; }
        
        /* Form Elements */
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #334155; font-weight: 600; font-size: 0.95rem; }
        .form-group input { width: 100%; padding: 0.8rem 1rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; color: #1e293b; transition: all 0.2s ease; }
        
        /* Interactive States */
        .form-group input:focus { outline: none; border-color: #007bff; box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.15); }
        
        /* Submit Button */
        button { background-color: #007bff; color: white; border: none; padding: 1rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s ease; margin-top: 0.5rem; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>Get Started</h2>
        <p>Please enter your information below to continue.</p>
        
        <form action="#" method="GET">
            <!-- Name Field -->
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Alex Mercer">
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="alex@company.com">
            </div>

            <!-- Age Field -->
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" min="1" max="120" required placeholder="25">
            </div>

            <button type="submit">Submit Information</button>
        </form>
    </div>

    <div>
        <h1>{{name}}</h1>
        <h1>{{email}}</h1>
        <h1>{{age}}</h1>
    </div>

</body>
</html>
