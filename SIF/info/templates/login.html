<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
        }

        .login-card{
            width:400px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:25px;
            padding:40px;
            box-shadow:0 15px 35px rgba(0,0,0,0.5);
        }

        .login-card h1{
            text-align:center;
            color:#fff;
            margin-bottom:30px;
            font-size:32px;
        }

        form p{
            margin-bottom:20px;
            color:#d1d5db;
        }

        form label{
            display:block;
            margin-bottom:8px;
            color:#cbd5e1;
            font-weight:500;
        }

        form input{
            width:100%;
            padding:14px;
            border:none;
            outline:none;
            border-radius:12px;
            background:rgba(255,255,255,0.08);
            color:white;
            border:1px solid rgba(255,255,255,0.1);
            font-size:15px;
            transition:0.3s;
        }

        form input:focus{
            border-color:#8b5cf6;
            box-shadow:0 0 15px rgba(139,92,246,0.5);
        }

        button{
            width:100%;
            padding:14px;
            margin-top:10px;
            border:none;
            border-radius:12px;
            background:linear-gradient(45deg,#7c3aed,#8b5cf6);
            color:white;
            font-size:17px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(139,92,246,0.4);
        }

        .footer{
            text-align:center;
            margin-top:20px;
            color:#94a3b8;
        }

        .footer a{
            color:#8b5cf6;
            text-decoration:none;
        }

        .footer a:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>🔐 Login</h1>

        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">Login</button>
        </form>

        <div class="footer">
            Welcome back! 🚀
        </div>
    </div>

</body>
</html>
