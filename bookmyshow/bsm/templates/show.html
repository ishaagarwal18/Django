<!DOCTYPE html>
<html>
<head>
    <title>Show Movies</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(to right,#141e30,#243b55);
            color:white;
            min-height:100vh;
        }

        nav{
            display:flex;
            justify-content:space-between;
            padding:20px 80px;
            background:rgba(0,0,0,0.4);
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
        }

        h1{
            text-align:center;
            margin:40px 0;
        }

        .container{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
            gap:25px;
            padding:30px 80px;
        }

        .movie-card{
            background:rgba(255,255,255,0.1);
            padding:25px;
            border-radius:20px;
            backdrop-filter:blur(10px);
            transition:0.4s;
            animation:slide 1s ease;
        }

        .movie-card:hover{
            transform:translateY(-10px);
        }

        .movie-card h2{
            margin-bottom:15px;
        }

        .movie-card p{
            margin:10px 0;
            color:#ddd;
        }

        @keyframes slide{
            from{
                opacity:0;
                transform:translateY(40px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>
</head>

<body>

<nav>
    <h2>🎬 MovieVerse</h2>

    <div>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'add' %}">Add Movie</a>
    </div>
</nav>

<h1>All Movies 🍿</h1>

<div class="container">

    {% for i in movies %}

    <div class="movie-card">

        <h2>{{i.name}}</h2>

        <p><strong>Director:</strong> {{i.director}}</p>

        <p><strong>Rating:</strong> ⭐ {{i.rating}}/10</p>

        <p><strong>Date:</strong> {{i.date}}</p>

    </div>

    {% endfor %}

</div>

</body>
</html>
