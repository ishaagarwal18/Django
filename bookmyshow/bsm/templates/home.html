<!DOCTYPE html>
<html>
<head>
    <title>Movie App</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(to right,#141e30,#243b55);
            color:white;
            min-height:100vh;
        }

        nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 80px;
            background:rgba(0,0,0,0.4);
            backdrop-filter:blur(10px);
            position:sticky;
            top:0;
        }

        nav h2{
            font-size:30px;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            padding:10px 18px;
            border-radius:10px;
            transition:0.4s;
        }

        nav a:hover{
            background:#ff4b2b;
            transform:translateY(-3px);
        }

        .hero{
            text-align:center;
            margin-top:150px;
            animation:fadeIn 1.2s ease;
        }

        .hero h1{
            font-size:60px;
            margin-bottom:20px;
        }

        .hero p{
            font-size:22px;
            color:#ddd;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>
</head>

<body>

<nav>
    <h2>🎬 MovieVerse</h2>

    <div>
        <a href="{% url 'add' %}">Add Movie</a>
        <a href="{% url 'show' %}">Show Movies</a>
    </div>
</nav>

<div class="hero">
    <h1>Welcome To MovieVerse 🍿</h1>
    <p>Add your favourite movies and explore them beautifully.</p>
</div>

</body>
</html>
