<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1" rules="all">
        <tr>
            <th>Subject</th>
            <th>Marks</th>
            <th>Result</th>
        </tr>
            {% for i in test %}
                <tr>
                    <td>{{i.Subject}}</td>
                    <td>{{i.Marks}}</td>
                    {% if i.Marks > 9 %}
                        <td>Pass</td>
                    {% else %}
                        <td>Fail</td>
                    {% endif %}
                </tr>
        {% endfor %}
    </table>
</body>
</html>
