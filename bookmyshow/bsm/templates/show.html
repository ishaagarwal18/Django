<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Records</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#ffeef5;
            padding:30px;
        }

        .container{
            max-width:1000px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        .top{
            display:flex;
            justify-content:space-between;
            margin-bottom:20px;
        }

        .btn{
            text-decoration:none;
            background:#ff85a2;
            color:white;
            padding:10px 18px;
            border-radius:8px;
            font-weight:bold;
        }

        .btn:hover{
            background:#ff5c8a;
        }

        h2{
            text-align:center;
            color:#ff5c8a;
            margin-bottom:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#ff85a2;
            color:white;
            padding:15px;
        }

        td{
            text-align:center;
            padding:12px;
            border-bottom:1px solid #ffd6df;
        }

        tr:hover{
            background:#fff4f7;
        }

        .search-form{
            text-align:center;
            margin-bottom:20px;
        }

        .search-form input{
            padding:10px;
            width:300px;
            border:2px solid #ffb6c1;
            border-radius:8px;
        }

        .search-form button{
            padding:10px 15px;
            background:#ff85a2;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="top">
        <a href="{% url 'home' %}" class="btn">🏠 Home</a>
        <a href="{% url 'add' %}" class="btn">➕ Add Movie</a>
    </div>

    <h2>🎬 Movie Records</h2>

    <form method="GET" action="{% url 'show' %}" class="search-form">
        <input type="text" name="search" placeholder="Search Movie Name">
        <button type="submit">Search</button>
    </form>

    <table>
        <tr>
            <th>Movie Name</th>
            <th>Director</th>
            <th>Rating</th>
            <th>Release Date</th>
        </tr>

        {% for i in d1 %}
        <tr>
            <td>{{ i.name }}</td>
            <td>{{ i.director }}</td>
            <td>⭐ {{ i.rating }}</td>
            <td>{{ i.date }}</td>
        </tr>

        {% empty %}
        <tr>
            <td colspan="4">No Movies Found</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
