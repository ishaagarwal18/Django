<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Movie</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#ffeef5;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:450px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#ff5c8a;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:2px solid #ffb6c1;
            border-radius:8px;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#ff85a2;
            color:white;
            font-size:16px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#ff5c8a;
        }

        .back{
            text-align:center;
            margin-top:15px;
        }

        .back a{
            text-decoration:none;
            color:#ff5c8a;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>🎬 Add Movie</h2>

    <form method="POST" action="{% url 'add' %}">
        {% csrf_token %}

        <label>Movie Name</label>
        <input type="text" name="name" required>

        <label>Director Name</label>
        <input type="text" name="director" required>

        <label>Rating</label>
        <input type="number" step="0.1" min="0" max="10" name="rating" required>

        <label>Release Date</label>
        <input type="date" name="date" required>

        <button type="submit">Save Movie</button>

    </form>

    <div class="back">
        <a href="{% url 'home' %}">← Back Home</a>
    </div>

</div>

</body>
</html>
