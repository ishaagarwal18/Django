<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Library</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#ffeef5;
            min-height:100vh;
        }

        nav{
            background:#ff85a2;
            color:white;
            text-align:center;
            padding:20px;
            font-size:30px;
            font-weight:bold;
        }

        .container{
            width:80%;
            margin:60px auto;
            text-align:center;
        }

        .search-box{
            margin-bottom:30px;
        }

        .search-box input{
            width:350px;
            padding:12px;
            border:2px solid #ff85a2;
            border-radius:10px;
            outline:none;
        }

        .search-box button{
            padding:12px 20px;
            border:none;
            border-radius:10px;
            background:#ff85a2;
            color:white;
            cursor:pointer;
            font-weight:bold;
        }

        .search-box button:hover{
            background:#ff5c8a;
        }

        .btn-group{
            display:flex;
            justify-content:center;
            gap:20px;
        }

        .btn{
            text-decoration:none;
            background:#ff85a2;
            color:white;
            padding:12px 25px;
            border-radius:10px;
            font-weight:bold;
        }

        .btn:hover{
            background:#ff5c8a;
        }
    </style>
</head>
<body>

    <nav>🎬 Movie Library</nav>

    <div class="container">

        <form action="{% url 'show' %}" method="GET" class="search-box">
            <input type="text" name="search" placeholder="Search Movie">
            <button type="submit">Search</button>
        </form>

        <div class="btn-group">
            <a href="{% url 'add' %}" class="btn">➕ Add Movie</a>
            <a href="{% url 'show' %}" class="btn">🎥 Show Movies</a>
        </div>

    </div>

</body>
</html>
