<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --bg-light: #f9fafb;
            --border-color: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            background-color: #fafafa;
            padding: 24px;
            margin: 0;
        }

        /* Responsive wrapper container */
        .table-container {
            width: 100%;
            overflow-x: auto;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-radius: 8px;
            background-color: #ffffff;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: var(--bg-light);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.05em;
            padding: 16px;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
        }

        /* Subtle row hover and striping effect */
        tbody tr:hover {
            background-color: #f3f4f6;
            transition: background-color 0.2s ease;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* Accent treatment for emphasis fields */
        .project-title {
            font-weight: 500;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>DOB</th>
                    <th>Enrollment</th>
                    <th>Project Title</th>
                    <th>Update</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody>
                {% for i in new %}
                <tr>
                    <td>{{ i.Name }}</td>
                    <td>{{ i.DOB }}</td>
                    <td>{{ i.enrollment }}</td>
                    <td class="project-title">{{ i.project_title }}</td>
                    <td><a href="{% url 'update' i.id %}">Edit</a></td>
                    <td><a href="{% url 'delete' i.id %}">Delete</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
